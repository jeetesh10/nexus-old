<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Platform - Welcome</title>
    <script src="config.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .user-info {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }

        .user-info h2 {
            color: white;
            margin-bottom: 10px;
        }

        .user-details {
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.9em;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .product-tile {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            cursor: pointer;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .product-tile:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
        }

        .product-tile.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: rgba(255, 255, 255, 0.7);
        }

        .product-icon {
            font-size: 3em;
            margin-bottom: 15px;
        }

        .product-title {
            font-size: 1.5em;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .product-description {
            color: #666;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .product-status {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: bold;
        }

        .status-available {
            background: #d4edda;
            color: #155724;
        }

        .status-coming-soon {
            background: #fff3cd;
            color: #856404;
        }

        .logout-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .loading {
            text-align: center;
            color: white;
            font-size: 1.2em;
            margin-top: 50px;
        }

        .redirect-banner {
            background: rgba(255,255,255,0.15);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.25);
            border-radius: 10px;
            padding: 12px 16px;
            margin-bottom: 16px;
            display: none;
        }
        .redirect-banner button {
            margin-left: 10px;
            padding: 6px 10px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .products-grid {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <button class="logout-btn" onclick="logout()">Logout</button>
    
    <div class="container">
        <div class="header">
            <h1>🚀 Nexus Platform</h1>
            <p>Welcome to your unified platform dashboard</p>
        </div>

        <div class="user-info" id="user-info">
            <h2>Welcome, <span id="username">Loading...</span>!</h2>
            <div class="user-details" id="user-details">
                Loading user information...
            </div>
        </div>

        <div id="redirect-banner" class="redirect-banner"></div>

        <div class="products-grid" id="products-grid">
            <div class="loading">Loading available products...</div>
        </div>
    </div>

    <script>
        // Helper: base64url decode
        function base64UrlDecode(input) {
            input = input.replace(/-/g, '+').replace(/_/g, '/');
            const pad = input.length % 4;
            if (pad) input += '='.repeat(4 - pad);
            return atob(input);
        }

        // Parse JWT token from URL
        function parseJwt(token) {
            try {
                const base64Url = token.split('.')[1];
                const jsonPayload = decodeURIComponent(base64UrlDecode(base64Url).split('').map(function(c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
                return JSON.parse(jsonPayload);
            } catch (e) {
                return null;
            }
        }


        
        // Load products from API (through Gateway)
        async function loadProducts() {
            try {
                console.log('🔄 Loading products from API Gateway (via proxy)...');
                const token = sessionStorage.getItem('access_token');
                const response = await fetch('/proxy/api/services', {
                    headers: token ? { 'Authorization': `Bearer ${token}` } : {}
                });
                if (response.ok) {
                    products = await response.json();
                    console.log('✅ Products loaded:', products.length);
                } else {
                    console.error('❌ Failed to load products:', response.status);
                    showError('Failed to load services. Please try again.');
                }
            } catch (error) {
                console.error('❌ Error loading products:', error);
                showError('Error loading services. Please check your connection.');
            }
        }
        
        // Load user's accessible services from API (through Gateway)
        async function loadUserAccessibleServices(userGroups) {
            try {
                console.log('🔄 Loading user accessible services (via proxy)...');
                const groupsParam = userGroups.join(',');
                const token = sessionStorage.getItem('access_token');
                const response = await fetch(`/proxy/api/user-access?groups=${encodeURIComponent(groupsParam)}`, {
                    headers: token ? { 'Authorization': `Bearer ${token}` } : {}
                });
                
                if (response.ok) {
                    const accessibleServices = await response.json();
                    console.log('✅ User accessible services:', accessibleServices);
                    return accessibleServices;
                } else {
                    console.error('❌ Failed to load user access:', response.status);
                    return [];
                }
            } catch (error) {
                console.error('❌ Error loading user access:', error);
                return [];
            }
        }

        // Products will be loaded dynamically from the API
        let products = [];

        // Load user information and render products
        async function loadUserInfo() {
            console.log('🔍 Loading user info...');
            console.log('Current URL:', window.location.href);
            console.log('URL hash:', window.location.hash);
            
            // Check for token in hash (implicit flow)
            const hash = window.location.hash.substr(1);
            console.log('Hash without #:', hash);
            
            const params = new URLSearchParams(hash);
            // Handle error responses from IdP
            const err = params.get('error');
            const errDesc = params.get('error_description');
            if (err) {
                console.error('OIDC error:', err, errDesc);
                showError(`${err}: ${decodeURIComponent(errDesc || '')}`);
                return;
            }
            const accessToken = params.get('access_token');
            const idToken = params.get('id_token');
            const returnedState = params.get('state');
            console.log('Access token found:', accessToken ? 'YES' : 'NO');
            
            if (accessToken) {
                console.log('Token length:', accessToken.length);
                console.log('Token preview:', accessToken.substring(0, 20) + '...');
            }

            // Validate state
            const expectedState = sessionStorage.getItem('oidc_state');
            if (expectedState && returnedState && expectedState !== returnedState) {
                console.warn('State mismatch', { expectedState, returnedState });
                showError('Security check failed (state mismatch). Please try logging in again.');
                return;
            }

            if (accessToken && idToken) {
                // Validate nonce via id_token
                const expectedNonce = sessionStorage.getItem('oidc_nonce');
                const decodedId = parseJwt(idToken);
                if (!decodedId || !decodedId.nonce || (expectedNonce && decodedId.nonce !== expectedNonce)) {
                    console.warn('Nonce validation failed', { expectedNonce, tokenNonce: decodedId && decodedId.nonce });
                    showError('Security check failed (nonce). Please try logging in again.');
                    return;
                }

                // Persist tokens for subsequent API calls if needed
                try {
                    sessionStorage.setItem('access_token', accessToken);
                    sessionStorage.setItem('id_token', idToken);
                } catch (e) {
                    console.warn('Unable to persist tokens:', e);
                }

                const decodedToken = parseJwt(accessToken);
                if (decodedToken) {
                    // Update user info
                    document.getElementById('username').innerText = decodedToken.preferred_username || 'User';
                    
                    // Analyze user groups for better display
                    const userGroups = (decodedToken.groups || []).map(g => typeof g === 'string' ? g : String(g));
                    const nexusGroups = userGroups.filter(g => g.includes('nexus') || g.toLowerCase().includes('admin'));
                    const clientGroups = userGroups.filter(g => g.includes('client'));
                    const serviceGroups = userGroups.filter(g => g.includes('service'));
                    const realmRoles = (decodedToken.realm_access && decodedToken.realm_access.roles) || [];
                    const clientRoles = Object.values(decodedToken.resource_access || {}).flatMap(v => v.roles || []);
                    const allRoles = [...new Set([...realmRoles, ...clientRoles])];
                    const parsedGroups = parseGroupPaths(userGroups);
                    
                    const userDetails = document.getElementById('user-details');
                    userDetails.innerHTML = `
                        <strong>Email:</strong> ${decodedToken.email || 'N/A'}<br>
                        <strong>User Type:</strong> ${nexusGroups.length > 0 ? 'Internal Nexus User' : 'Client User'}<br>
                        <strong>Access Level:</strong> ${nexusGroups.includes('platform-admin') ? 'Platform Admin' : 
                                                       nexusGroups.includes('service-admin') ? 'Service Admin' : 
                                                       clientGroups.length > 0 ? 'Client Access' : 'Limited Access'}<br>
                        <strong>Available Services:</strong> ${serviceGroups.length > 0 ? serviceGroups.join(', ') : 'None'}<br>
                        <strong>Token Expires:</strong> ${new Date(decodedToken.exp * 1000).toLocaleString()}
                        <hr style="margin:10px 0; border-color: rgba(255,255,255,0.2);">
                        <strong>Groups (raw):</strong> ${(userGroups.length? userGroups.join(', ') : 'None')}<br>
                        <strong>Groups (parsed):</strong> ${parsedGroups.map(pg => `${pg.root}${pg.sub1? ' > '+pg.sub1: ''}${pg.sub2? ' > '+pg.sub2: ''}`).join(' | ') || 'None'}<br>
                        <strong>Roles:</strong> ${allRoles.length ? allRoles.join(', ') : 'None'}
                    `;

                    // Group-based redirect banner/logic (optional)
                    if (typeof config.autoRedirectAfterLogin === 'undefined' || config.autoRedirectAfterLogin) {
                        tryRouteByGroup(userGroups);
                    }

                    // Load products and render based on user groups
                    await loadProducts();
                    await renderProducts(userGroups);
                    // Clean up hash to keep URL tidy
                    try {
                        history.replaceState({}, document.title, window.location.pathname);
                    } catch {}
                } else {
                    showError('Error decoding authentication token.');
                }
            } else {
                showError('No authentication token found. Please log in.');
            }
        }

        function groupMatch(groups, patterns) {
            const lower = groups.map(g => g.toLowerCase());
            return patterns.some(p => lower.some(g => g.includes(p)));
        }

        function parseGroupPaths(groups) {
            return groups.map(g => {
                const p = g.startsWith('/') ? g.slice(1) : g;
                const parts = p.split('/');
                return { root: parts[0] || '', sub1: parts[1] || '', sub2: parts[2] || '' };
            });
        }

        function tryRouteByGroup(userGroups) {
            const banner = document.getElementById('redirect-banner');
            let targetUrl = null;
            let targetLabel = '';

            // Admin buckets
            if (groupMatch(userGroups, ['nexus/platform-admin', 'nexus/admin-dashboard', '/admin', 'admin'])) {
                targetUrl = config.services.adminDashboard?.dev || 'http://localhost:8081';
                targetLabel = 'Admin Dashboard';
            }

            // Customer buckets (example: retailer tenants)
            if (!targetUrl && groupMatch(userGroups, ['/customer', 'customer', 'retailer'])) {
                targetUrl = config.services.customerPortal?.dev || 'http://localhost:8080';
                targetLabel = 'Customer Portal';
            }

            if (!targetUrl) return; // no redirect, remain on landing

            let seconds = 4;
            const updateBanner = () => {
                banner.style.display = 'block';
                banner.innerHTML = `You have access to <strong>${targetLabel}</strong>. Redirecting in ${seconds}s...`
                  + ` <button id="cancel-redirect">Stay here</button>`
                  + ` <button id="go-now">Go now</button>`;
                document.getElementById('cancel-redirect').onclick = () => {
                    clearInterval(timer);
                    banner.style.display = 'none';
                };
                document.getElementById('go-now').onclick = () => {
                    clearInterval(timer);
                    window.location.href = targetUrl;
                };
            };
            updateBanner();
            const timer = setInterval(() => {
                seconds -= 1;
                if (seconds <= 0) {
                    clearInterval(timer);
                    window.location.href = targetUrl;
                } else {
                    updateBanner();
                }
            }, 1000);
        }

        // Render available products
        async function renderProducts(userGroups) {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = '<div class="loading">Loading services...</div>';

            try {
                // Load user's accessible services from API
                const accessibleServices = await loadUserAccessibleServices(userGroups);
                
                // Create a map of accessible service IDs for quick lookup
                const accessibleServiceIds = new Set(accessibleServices.map(service => service.service_id));
                
                grid.innerHTML = '';
                
                // Render only accessible products
                products.forEach(product => {
                    const hasAccessToProduct = accessibleServiceIds.has(product.service_id);
                    const tile = document.createElement('div');
                    tile.className = `product-tile ${!hasAccessToProduct ? 'disabled' : ''}`;
                    
                    tile.innerHTML = `
                        <div class="product-icon">${product.icon}</div>
                        <div class="product-title">${product.title}</div>
                        <div class="product-description">${product.description}</div>
                        <div class="product-status status-${product.status}">
                            ${product.status === 'available' ? 'Available' : 'Coming Soon'}
                        </div>
                    `;

                    if (hasAccessToProduct && product.status === 'available') {
                        tile.onclick = () => window.open(product.url, '_blank');
                    }

                    grid.appendChild(tile);
                });
                
                console.log(`🎯 Rendered ${accessibleServices.length} accessible services for user`);
            } catch (error) {
                console.error('❌ Error rendering products:', error);
                grid.innerHTML = '<div class="error">Failed to load services. Please try again.</div>';
            }
        }

        // Show error message
        function showError(message) {
            document.getElementById('user-info').innerHTML = `
                <h2>Error</h2>
                <div class="user-details">${message}</div>
            `;
            document.getElementById('products-grid').innerHTML = `
                <div class="loading">Please log in to access the platform.</div>
            `;
        }

        // Logout function
        function logout() {
            // Read tokens for id_token_hint
            const idToken = sessionStorage.getItem('id_token');
            // Clear any stored tokens
            localStorage.removeItem('access_token');
            sessionStorage.removeItem('access_token');
            sessionStorage.removeItem('id_token');
            
            // Redirect to Keycloak logout with post_logout_redirect_uri back to login.html
            const post = encodeURIComponent(config.landingPageUrl + '/login.html');
            const params = new URLSearchParams();
            params.set('post_logout_redirect_uri', config.landingPageUrl + '/login.html');
            params.set('client_id', 'nexus-landing');
            if (idToken) params.set('id_token_hint', idToken);
            const idpPrefix = config.isCodespaces ? '/keycloak' : config.keycloakBaseUrl;
            const logoutUrl = `${idpPrefix}/realms/nexus/protocol/openid-connect/logout?${params.toString()}`;
            window.location.href = logoutUrl;
        }

        // Load user info when page loads
        window.onload = loadUserInfo;
    </script>
</body>
</html>
