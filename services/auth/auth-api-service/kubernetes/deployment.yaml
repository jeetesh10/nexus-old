apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-api-service
  namespace: nexus-platform
  labels:
    app: auth-api-service
    service: auth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-api-service
  template:
    metadata:
      labels:
        app: auth-api-service
        service: auth
    spec:
      containers:
      - name: auth-api
        image: auth-api-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8084
        env:
        - name: KEYCLOAK_BASE_URL
          value: "http://keycloak-service:8080"
        - name: KEYCLOAK_REALM
          value: "nexus-platform"
        - name: KEYCLOAK_CLIENT_ID
          value: "nexus-platform"
        - name: KEYCLOAK_CLIENT_SECRET
          value: "your-client-secret"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /api/auth/health
            port: 8084
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/auth/health
            port: 8084
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: auth-api-service
  namespace: nexus-platform
  labels:
    app: auth-api-service
    service: auth
spec:
  selector:
    app: auth-api-service
  ports:
  - name: http
    port: 8084
    targetPort: 8084
  type: ClusterIP
