apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-api-service
  namespace: nexus-platform
  labels:
    app: auth-api-service
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-api-service
  template:
    metadata:
      labels:
        app: auth-api-service
        version: v1
      annotations:
        linkerd.io/inject: enabled
    spec:
      containers:
      - name: auth-api-service
        image: auth-api-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8085
          name: http
        env:
        - name: KEYCLOAK_BASE_URL
          value: "http://keycloak-service.keycloak.svc.cluster.local:8080"
        - name: KEYCLOAK_REALM
          value: "nexus"
        - name: KEYCLOAK_CLIENT_ID
          value: "nexus-client"
        - name: KEYCLOAK_CLIENT_SECRET
          value: "Ooq6EKQ4lCaGVgrNMOMyzRXelWWHLeKM"
        - name: KEYCLOAK_ADMIN_USERNAME
          valueFrom:
            secretKeyRef:
              name: keycloak-credentials
              key: admin-username
        - name: KEYCLOAK_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: keycloak-credentials
              key: admin-password
        - name: SERVICE_PORT
          value: "8085"
        - name: LOG_LEVEL
          value: "INFO"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /api/auth/health
            port: 8085
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/auth/health
            port: 8085
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL

---
apiVersion: v1
kind: Service
metadata:
  name: auth-api-service
  namespace: nexus-platform
  labels:
    app: auth-api-service
  annotations:
    linkerd.io/inject: enabled
spec:
  selector:
    app: auth-api-service
  ports:
  - name: http
    port: 8085
    targetPort: 8085
    protocol: TCP
  type: ClusterIP
