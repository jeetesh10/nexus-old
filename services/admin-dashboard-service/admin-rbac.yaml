apiVersion: v1
kind: ServiceAccount
metadata:
  name: admin-dashboard-sa
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: admin-dashboard-role
rules:
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list", "patch", "watch"]
- apiGroups: [""]
  resources: ["pods", "services"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["pods/log"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: admin-dashboard-role-binding
subjects:
- kind: ServiceAccount
  name: admin-dashboard-sa
  namespace: default
roleRef:
  kind: ClusterRole
  name: admin-dashboard-role
  apiGroup: rbac.authorization.k8s.io
