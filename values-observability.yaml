prometheus:
  prometheusSpec:
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 8Gi
grafana:
  enabled: true
  adminPassword: admin
  persistence:
    type: hostPath
    enabled: true
    size: 2Gi
    existingClaim: ""
    storageClassName: ""
    accessModes: ["ReadWriteOnce"]
  service:
    type: NodePort
loki:
  persistence:
    size: 8Gi
    storageClassName: ""
    accessModes: ["ReadWriteOnce"]
