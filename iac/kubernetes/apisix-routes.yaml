apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: nexus-platform-routes
  namespace: apisix
spec:
  http:
  - name: admin-dashboard-route
    match:
      hosts:
      - admin-dashboard.local
      paths:
      - /*
    backends:
    - serviceName: admin-dashboard-service
      servicePort: 8080
      weight: 100
    plugins:
      proxy-rewrite:
        regex_uri:
        - "^/(.*)"
        - "/$1"
      cors:
        allow_origins: "*"
        allow_methods: "GET,POST,PUT,DELETE,OPTIONS"
        allow_headers: "Content-Type,Authorization"
        expose_headers: "*"
        max_age: 3600
        allow_credentials: true
  - name: auth-api-route
    match:
      hosts:
      - auth-api.local
      paths:
      - /api/auth/*
    backends:
    - serviceName: auth-api-service
      servicePort: 8080
      weight: 100
    plugins:
      proxy-rewrite:
        regex_uri:
        - "^/api/auth/(.*)"
        - "/$1"
      cors:
        allow_origins: "*"
        allow_methods: "GET,POST,PUT,DELETE,OPTIONS"
        allow_headers: "Content-Type,Authorization"
        expose_headers: "*"
        max_age: 3600
        allow_credentials: true
  - name: mongodb-orchestrator-route
    match:
      hosts:
      - mongodb-orchestrator.local
      paths:
      - /api/mongodb/*
    backends:
    - serviceName: mongodb-orchestrator-service
      servicePort: 8000
      weight: 100
    plugins:
      proxy-rewrite:
        regex_uri:
        - "^/api/mongodb/(.*)"
        - "/$1"
      cors:
        allow_origins: "*"
        allow_methods: "GET,POST,PUT,DELETE,OPTIONS"
        allow_headers: "Content-Type,Authorization"
        expose_headers: "*"
        max_age: 3600
        allow_credentials: true
  - name: postgresql-orchestrator-route
    match:
      hosts:
      - postgresql-orchestrator.local
      paths:
      - /api/postgresql/*
    backends:
    - serviceName: postgresql-orchestrator-service
      servicePort: 8000
      weight: 100
    plugins:
      proxy-rewrite:
        regex_uri:
        - "^/api/postgresql/(.*)"
        - "/$1"
      cors:
        allow_origins: "*"
        allow_methods: "GET,POST,PUT,DELETE,OPTIONS"
        allow_headers: "Content-Type,Authorization"
        expose_headers: "*"
        max_age: 3600
        allow_credentials: true
---
apiVersion: apisix.apache.org/v2
kind: ApisixUpstream
metadata:
  name: nexus-platform-upstreams
  namespace: apisix
spec:
  loadbalancer:
    type: roundrobin
  nodes:
  - host: admin-dashboard-service.default.svc.cluster.local
    port: 8080
    weight: 100
  - host: auth-api-service.default.svc.cluster.local
    port: 8080
    weight: 100
  - host: mongodb-orchestrator-service.default.svc.cluster.local
    port: 8000
    weight: 100
  - host: postgresql-orchestrator-service.default.svc.cluster.local
    port: 8000
    weight: 100
