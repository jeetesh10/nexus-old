apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: nexus-platform-routes
  namespace: apisix
spec:
  http:
  - name: admin-dashboard-route
    match:
      hosts:
      - admin-dashboard.local
      paths:
      - /*
    backends:
    - serviceName: admin-dashboard-service
      servicePort: 8000
      weight: 100
  # plugins removed for CRD compatibility
  - name: auth-api-route
    match:
      hosts:
      - auth-api.local
      paths:
      - /api/auth/*
    backends:
    - serviceName: auth-api-service
      servicePort: 8084
      weight: 100
  # plugins removed for CRD compatibility
  - name: mongodb-orchestrator-route
    match:
      hosts:
      - mongodb-orchestrator.local
      paths:
      - /api/mongodb/*
    backends:
    - serviceName: mongodb-orchestrator-service
      servicePort: 8000
      weight: 100
  # plugins removed for CRD compatibility
  - name: single-entry-admin
    match:
      hosts:
      - nexus.local
      paths:
      - /*
    backends:
    - serviceName: landing-page-service
      servicePort: 8000
      weight: 100
  - name: keycloak-under-single-entry
    match:
      hosts:
      - nexus.local
      paths:
      - /keycloak/*
    plugins:
    - name: proxy-rewrite
      enable: true
      config:
        regex_uri:
        - ^/keycloak/(.*)
        - /$1
        headers:
          X-Forwarded-Proto: https
    backends:
    - serviceName: keycloak-service
      servicePort: 8080
      weight: 100
  - name: nexus-admin-route
    match:
      hosts:
      - nexus.local
      paths:
      - /admin/*
    plugins:
    - name: openid-connect
      enable: true
      config:
        client_id: nexus-gateway
        client_secret: CHANGE_ME
        discovery: http://keycloak-service.default.svc.cluster.local:8080/realms/nexus/.well-known/openid-configuration
        authorization_endpoint: http://keycloak.local/realms/nexus/protocol/openid-connect/auth
        token_endpoint: http://keycloak-service.default.svc.cluster.local:8080/realms/nexus/protocol/openid-connect/token
        userinfo_endpoint: http://keycloak-service.default.svc.cluster.local:8080/realms/nexus/protocol/openid-connect/userinfo
        redirect_uri: http://nexus.local/callback
        scope:
          - openid
          - profile
          - email
        bearer_only: false
        set_userinfo_header: true
        set_id_token_header: false
        set_access_token_header: false
        session:
          secret: please-change-this-session-secret-32-bytes-min
    backends:
    - serviceName: admin-dashboard-service
      servicePort: 8000
      weight: 100

  - name: nexus-customer-route
    match:
      hosts:
      - nexus.local
      paths:
      - /customer/*
    plugins:
    - name: openid-connect
      enable: true
      config:
        client_id: nexus-gateway
        client_secret: CHANGE_ME
        discovery: http://keycloak-service.default.svc.cluster.local:8080/realms/nexus/.well-known/openid-configuration
        authorization_endpoint: http://keycloak.local/realms/nexus/protocol/openid-connect/auth
        token_endpoint: http://keycloak-service.default.svc.cluster.local:8080/realms/nexus/protocol/openid-connect/token
        userinfo_endpoint: http://keycloak-service.default.svc.cluster.local:8080/realms/nexus/protocol/openid-connect/userinfo
        redirect_uri: http://nexus.local/callback
        scope:
          - openid
          - profile
          - email
        bearer_only: false
        set_userinfo_header: true
        set_id_token_header: false
        set_access_token_header: false
        session:
          secret: please-change-this-session-secret-32-bytes-min
    backends:
    - serviceName: customer-portal
      servicePort: 8002
      weight: 100
  - name: nexus-oidc-callback
    match:
      hosts:
      - nexus.local
      paths:
      - /callback
    plugins:
    - name: openid-connect
      enable: true
      config:
        client_id: nexus-gateway
        client_secret: CHANGE_ME
        discovery: http://keycloak-service.default.svc.cluster.local:8080/realms/nexus/.well-known/openid-configuration
        authorization_endpoint: http://keycloak.local/realms/nexus/protocol/openid-connect/auth
        token_endpoint: http://keycloak-service.default.svc.cluster.local:8080/realms/nexus/protocol/openid-connect/token
        userinfo_endpoint: http://keycloak-service.default.svc.cluster.local:8080/realms/nexus/protocol/openid-connect/userinfo
        redirect_uri: http://nexus.local/callback
        scope:
          - openid
          - profile
          - email
        bearer_only: false
        set_userinfo_header: true
        set_id_token_header: false
        set_access_token_header: false
        session:
          secret: please-change-this-session-secret-32-bytes-min
    backends:
    - serviceName: landing-page-service
      servicePort: 8000
      weight: 100
  - name: customer-portal-under-admin
    match:
      hosts:
      - admin-dashboard.local
      paths:
      - /customer/*
    backends:
    - serviceName: admin-dashboard-service
      servicePort: 8000
      weight: 100
  - name: postgresql-orchestrator-route
    match:
      hosts:
      - postgresql-orchestrator.local
      paths:
      - /api/postgresql/*
    backends:
    - serviceName: postgresql-orchestrator-service
      servicePort: 8000
      weight: 100
  # plugins removed for CRD compatibility
  - name: keycloak-route
    match:
      hosts:
      - keycloak.local
      paths:
      - /*
    backends:
    - serviceName: keycloak-service
      servicePort: 8080
      weight: 100
  - name: customer-portal-route
    match:
      hosts:
      - customer.local
      paths:
      - /*
    backends:
    - serviceName: customer-portal
      servicePort: 8002
      weight: 100
---
apiVersion: apisix.apache.org/v2
kind: ApisixUpstream
metadata:
  name: nexus-platform-upstreams
  namespace: apisix
spec:
  loadbalancer:
    type: roundrobin
  # nodes removed for CRD compatibility
