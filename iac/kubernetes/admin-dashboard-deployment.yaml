apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-dashboard
  labels:
    app: admin-dashboard
spec:
  replicas: 2
  selector:
    matchLabels:
      app: admin-dashboard
  template:
    metadata:
      labels:
        app: admin-dashboard
    spec:
      containers:
      - name: admin-dashboard
        image: nexus/admin-dashboard:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
        env:
        - name: AUTH_API_URL
          value: "http://auth-api-service:8080"
        - name: KEYCLOAK_URL
          value: "/keycloak"
        - name: KEYCLOAK_INTERNAL_URL
          value: "http://keycloak-service:8080"
        - name: KEYCLOAK_REALM
          value: "nexus"
        - name: ADMIN_CLIENT_ID
          value: "admin-dashboard"
        - name: CUSTOMER_CLIENT_ID
          value: "customer-portal"
        - name: REQUIRED_ADMIN_GROUP
          value: "platform-admins"
        - name: REQUIRED_CUSTOMER_GROUP
          value: "customers"
        - name: MONGODB_ORCHESTRATOR_URL
          value: "http://mongodb-orchestrator-service:8000"
        - name: POSTGRESQL_ORCHESTRATOR_URL
          value: "http://postgresql-orchestrator-service:8000"
        - name: MONGODB_AUDIT_URI
          value: "mongodb://mongodb-service.default.svc.cluster.local:27017"
        - name: MONGODB_AUDIT_DB
          value: "nexus"
        - name: MONGODB_AUDIT_COLLECTION
          value: "audit_logins"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: admin-dashboard-service
  labels:
    app: admin-dashboard
spec:
  selector:
    app: admin-dashboard
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: admin-dashboard-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
  - host: admin-dashboard.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: admin-dashboard-service
            port:
              number: 8000
