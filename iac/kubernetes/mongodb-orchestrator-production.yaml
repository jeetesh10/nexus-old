apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb-orchestrator
  namespace: default
  labels:
    app: mongodb-orchestrator
    version: v1
    nexus.service.type: database
    nexus.service.description: "MongoDB-Orchestrator-Service"
    nexus.service.icon: "database"
    nexus.service.url: "mongodb-orchestrator.local"
    nexus.service.port: "8000"
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: mongodb-orchestrator
  template:
    metadata:
      labels:
        app: mongodb-orchestrator
        version: v1
        nexus.service.type: database
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: mongodb-orchestrator-account
      containers:
      - name: mongodb-orchestrator
        image: nexus/mongodb-orchestrator:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
          name: http
        - containerPort: 9090
          name: metrics
        env:
        - name: MONGODB_URL
          value: "mongodb://admin:adminpass123@mongodb-service:27017"
        - name: LOG_LEVEL
          value: "INFO"
        - name: METRICS_ENABLED
          value: "true"
        - name: HEALTH_CHECK_ENABLED
          value: "true"
        - name: CONNECTION_POOL_SIZE
          value: "20"
        - name: CONNECTION_POOL_MAX_SIZE
          value: "50"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 10
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mongodb-orchestrator-account
  namespace: default
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb-orchestrator-service
  namespace: default
  labels:
    app: mongodb-orchestrator
    nexus.service.type: database
spec:
  selector:
    app: mongodb-orchestrator
  ports:
  - name: http
    port: 8000
    targetPort: 8000
  - name: metrics
    port: 9090
    targetPort: 9090
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: mongodb-orchestrator-hpa
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: mongodb-orchestrator
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: mongodb-orchestrator-monitor
  namespace: default
spec:
  selector:
    matchLabels:
      app: mongodb-orchestrator
  endpoints:
  - port: metrics
    interval: 30s
    path: /metrics
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: mongodb-orchestrator-alerts
  namespace: default
spec:
  groups:
  - name: mongodb-orchestrator
    rules:
    - alert: MongoDBOrchestratorDown
      expr: up{job="mongodb-orchestrator"} == 0
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "MongoDB Orchestrator is down"
        description: "MongoDB Orchestrator service has been down for more than 1 minute"
    - alert: MongoDBOrchestratorHighLatency
      expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{job="mongodb-orchestrator"}[5m])) > 3
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "MongoDB Orchestrator high latency"
        description: "95th percentile latency is above 3 seconds"
    - alert: MongoDBOrchestratorHighErrorRate
      expr: rate(http_requests_total{job="mongodb-orchestrator", status=~"5.."}[5m]) / rate(http_requests_total{job="mongodb-orchestrator"}[5m]) > 0.05
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "MongoDB Orchestrator high error rate"
        description: "Error rate is above 5%"
    - alert: MongoDBConnectionPoolExhausted
      expr: mongodb_connection_pool_available{job="mongodb-orchestrator"} < 5
      for: 2m
      labels:
        severity: warning
      annotations:
        summary: "MongoDB connection pool nearly exhausted"
        description: "Available connections in pool is below 5"
