apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-api-service
  namespace: default
  labels:
    app: auth-api-service
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-api-service
  template:
    metadata:
      labels:
        app: auth-api-service
        version: v1
    spec:
      containers:
      - name: auth-api
        image: nexus/auth-api:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8084
          name: http
        env:
        - name: KEYCLOAK_URL
          value: "http://keycloak-service:8080"
        - name: KEYCLOAK_REALM
          value: "nexus"
        - name: KEYCLOAK_CLIENT_ID
          value: "nexus-platform"
        - name: KEYCLOAK_CLIENT_SECRET
          value: "your-client-secret"
        - name: JWT_SECRET
          value: "your-jwt-secret-key"
        - name: PORT
          value: "8084"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        livenessProbe:
          httpGet:
            path: /api/auth/health
            port: 8084
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/auth/health
            port: 8084
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: auth-api-service
  namespace: default
  labels:
    app: auth-api-service
spec:
  selector:
    app: auth-api-service
  ports:
  - name: http
    port: 8084
    targetPort: 8084
    protocol: TCP
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: auth-api-ingress
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
  - host: auth-api.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: auth-api-service
            port:
              number: 8080
