apiVersion: apps/v1
kind: Deployment
metadata:
  name: access-control-service
  namespace: default
  labels:
    app: access-control-service
    version: v1
    nexus.service.type: access-control
    nexus.service.description: "Access-Control-Service"
    nexus.service.icon: "🔐"
    nexus.service.url: "access-control.local"
    nexus.service.port: "8000"
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: access-control-service
  template:
    metadata:
      labels:
        app: access-control-service
        version: v1
        nexus.service.type: access-control
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: access-control-service-account
      containers:
      - name: access-control
        image: nexus/access-control:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
          name: http
        - containerPort: 9090
          name: metrics
        env:
        - name: MONGODB_ORCHESTRATOR_URL
          value: "http://mongodb-orchestrator-service:8000"
        - name: AUTH_API_URL
          value: "http://auth-api-service:8084"
        - name: LOG_LEVEL
          value: "INFO"
        - name: METRICS_ENABLED
          value: "true"
        - name: HEALTH_CHECK_ENABLED
          value: "true"
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 10
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL

---
apiVersion: v1
kind: Service
metadata:
  name: access-control-service
  namespace: default
  labels:
    app: access-control-service
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: http
  - port: 9090
    targetPort: 9090
    protocol: TCP
    name: metrics
  selector:
    app: access-control-service

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: access-control-service-account
  namespace: default
  labels:
    app: access-control-service

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: access-control-service-role
  labels:
    app: access-control-service
rules:
- apiGroups: [""]
  resources: ["pods", "services", "endpoints"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets"]
  verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: access-control-service-binding
  labels:
    app: access-control-service
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: access-control-service-role
subjects:
- kind: ServiceAccount
  name: access-control-service-account
  namespace: default

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: access-control-service-hpa
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: access-control-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60

---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: access-control-service-monitor
  namespace: default
  labels:
    app: access-control-service
spec:
  selector:
    matchLabels:
      app: access-control-service
  endpoints:
  - port: metrics
    path: /metrics
    interval: 30s

---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: access-control-service-alerts
  namespace: default
  labels:
    app: access-control-service
spec:
  groups:
  - name: access-control-service
    rules:
    - alert: AccessControlServiceDown
      expr: up{job="access-control-service"} == 0
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "Access Control Service is down"
        description: "Access Control Service has been down for more than 1 minute"
    
    - alert: AccessControlServiceHighCPU
      expr: rate(container_cpu_usage_seconds_total{container="access-control"}[5m]) > 0.8
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Access Control Service high CPU usage"
        description: "Access Control Service CPU usage is above 80%"
    
    - alert: AccessControlServiceHighMemory
      expr: container_memory_usage_bytes{container="access-control"} / container_spec_memory_limit_bytes{container="access-control"} > 0.8
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Access Control Service high memory usage"
        description: "Access Control Service memory usage is above 80%"

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: access-control-ingress
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  rules:
  - host: access-control.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: access-control-service
            port:
              number: 8000
