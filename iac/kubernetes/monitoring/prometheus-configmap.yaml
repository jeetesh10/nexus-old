apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: nexus-platform
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s

    # This section tells Prometheus where to find the alert rule files
    rule_files:
      - /etc/prometheus-alerts/*.yml

    # This section tells Prometheus where to send alerts
    alerting:
      alertmanagers:
      - static_configs:
        - targets:
          - alertmanager-service.nexus-platform.svc:9093

    scrape_configs:
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']
