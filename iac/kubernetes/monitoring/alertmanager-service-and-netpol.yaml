apiVersion: v1
kind: Service
metadata:
  name: alertmanager-service
  namespace: nexus-platform
spec:
  selector:
    app: alertmanager # <-- This was the incorrect part, now fixed.
  ports:
    - name: http
      protocol: TCP
      port: 9093
      targetPort: 9093
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-alertmanager
  namespace: nexus-platform
spec:
  podSelector:
    matchLabels:
      app: alertmanager
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: prometheus
      ports:
        - protocol: TCP
          port: 9093
