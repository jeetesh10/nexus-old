apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana-deployment
  namespace: nexus-platform
spec:
  replicas: 1 # Grafana can run with 1 replica; HA is more complex
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
      - name: grafana
        image: grafana/grafana:9.5.1 # Using a specific, stable version
        ports:
        - name: http
          containerPort: 3000
        envFrom:
        - secretRef:
            name: grafana-secret
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "1"
            memory: "1Gi"
        readinessProbe:
          httpGet:
            path: /api/health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /api/health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 30
        volumeMounts:
        - name: grafana-config
          mountPath: /etc/grafana/grafana.ini
          subPath: grafana.ini
      volumes:
      - name: grafana-config
        configMap:
          name: grafana-config # Assumes your grafana-config.yaml creates a ConfigMap with this name