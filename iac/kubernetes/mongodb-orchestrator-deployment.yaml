apiVersion: v1
kind: Service
metadata:
  name: mongodb-orchestrator
  namespace: default
  labels:
    app: mongodb-orchestrator
spec:
  selector:
    app: mongodb-orchestrator
  ports:
    - name: http
      port: 80
      targetPort: 8080
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb-orchestrator
  namespace: default
  labels:
    app: mongodb-orchestrator
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mongodb-orchestrator
  template:
    metadata:
      labels:
        app: mongodb-orchestrator
      annotations:
        # enable linkerd sidecar injection (alternatively label the namespace)
        linkerd.io/inject: "enabled"
    spec:
      serviceAccountName: mongodb-orchestrator-sa
      containers:
        - name: mongodb-orchestrator
          image: nexus/mongodb-orchestrator:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: mongodb-orch-config
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      # optional tolerations/nodeSelector if you need them
