apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb-orchestrator
  namespace: default
  labels:
    app: mongodb-orchestrator
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mongodb-orchestrator
  template:
    metadata:
      labels:
        app: mongodb-orchestrator
      annotations:
        linkerd.io/inject: enabled
    spec:
      containers:
      - name: mongodb-orchestrator
        image: nexus/mongodb-orchestrator:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
        env:
        - name: MONGODB_URL
          value: "mongodb://mongodb-service:27017"
        - name: AUTH_API_URL
          value: "http://auth-api-service:8080"
        - name: LOG_LEVEL
          value: "INFO"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb-orchestrator-service
  namespace: default
  labels:
    app: mongodb-orchestrator
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: mongodb-orchestrator
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mongodb-orchestrator-ingress
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
  - host: mongodb-orchestrator.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: mongodb-orchestrator-service
            port:
              number: 8000
