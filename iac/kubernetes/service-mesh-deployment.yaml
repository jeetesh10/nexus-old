apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-mesh-controller
  namespace: default
  labels:
    app: service-mesh-controller
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-mesh-controller
  template:
    metadata:
      labels:
        app: service-mesh-controller
        version: v1
    spec:
      containers:
      - name: service-mesh
        image: jeetesh10/service-mesh:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8085
          name: http
        env:
        - name: MESH_PORT
          value: "8085"
        - name: LOG_LEVEL
          value: "INFO"
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8085
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8085
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: service-mesh-controller
  namespace: default
  labels:
    app: service-mesh-controller
spec:
  selector:
    app: service-mesh-controller
  ports:
  - name: http
    port: 8085
    targetPort: 8085
  type: ClusterIP
